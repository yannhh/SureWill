<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SureWill Backend Test</title>
  </head>
  <body>
    <h1>Test HTML</h1>
    <hr />

    <section>
      <h2>User Authentication</h2>
      <input type="text" id="regUser" placeholder="Username" />
      <input type="email" id="regEmail" placeholder="Email" />
      <input type="password" id="regPass" placeholder="Password" />
      <button onclick="register()">Register</button>
      <br /><br />
      <input type="email" id="loginEmail" placeholder="Email" />
      <input type="password" id="loginPass" placeholder="Password" />
      <button onclick="login()">Login</button>
      <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" />
      <button onclick="verifyOTP()">Verify OTP</button>
      <p>
        <strong>Current User ID:</strong> <span id="displayUserId">None</span>
      </p>
    </section>

    <hr />

    <section>
      <h2>Add Beneficiary</h2>
      <input type="text" id="benName" placeholder="Full Name" />
      <input type="email" id="benEmail" placeholder="Email" />
      <input type="text" id="benRel" placeholder="Relationship" />
      <button onclick="addBeneficiary()">Add Beneficiary</button>
      <p>
        <strong>Last Beneficiary ID:</strong>
        <span id="displayBenId">None</span>
      </p>
    </section>

    <hr />

    <section>
      <h2>Vault Management</h2>
      <p><em>Note: This simulates an encrypted upload.</em></p>
      <input
        type="text"
        id="fileName"
        placeholder="File Name (e.g. Will.pdf)"
      />
      <button onclick="uploadAsset()">Upload Dummy Encrypted Asset</button>
      <br /><br />
      <button onclick="listAssets()">List My Assets</button>
      <div id="assetList"></div>
    </section>

    <h2>Password Reset</h2>
    <input type="email" id="forgotEmail" placeholder="Enter your email" />
    <button onclick="forgotPassword()">Send Reset Link</button>
    <hr />
    <input type="text" id="resetToken" placeholder="Paste Token from Email" />
    <input type="password" id="newPass" placeholder="New Password" />
    <button onclick="resetPassword()">Update Password</button>
    <hr />

    <section>
      <h2>TOTP Setup</h2>
      <button onclick="setupTOTP(currentUserId)">Generate QR Code</button>
      <div id="qrContainer"></div>
      <input type="text" id="totpToken" placeholder="6-digit code" />
      <button onclick="verifyTOTP()">Enable TOTP</button>
    </section>

    <section>
      <h2>System Logs</h2>
      <pre
        id="logs"
        style="background: #eee; padding: 10px; border: 1px solid #ccc"
      >
Waiting for actions...</pre
      >
    </section>

    <script>
      // Base URL for our backend API
      const API_URL = "https://localhost:5050/api";
      // Global variables to store IDs so we don't have to copy-paste them manually during testing
      let currentUserId = null;
      let lastBenId = null;

      // Helper function to display raw JSON responses in the "System Logs" box
      function log(msg) {
        document.getElementById("logs").innerText = JSON.stringify(
          msg,
          null,
          2,
        );
      }

      // --- TOTP (Two-Factor Auth) Functions ---
      async function setupTOTP(userId) {
        try {
          console.log("Sending request to backend..."); // Browser console log
          // Request the backend to generate a TOTP secret and QR code
          const res = await fetch(`https://localhost:5050/api/totp/setup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            // Make sure you are sending the userId that matches your database
            body: JSON.stringify({ userId: userId }),
          });

          const data = await res.json();
          console.log("Data received from backend:", data); // Browser console log

          if (data.qrCode) {
            // CORRECT WAY: Put an <img> tag inside the container
            // The data.qrCode string MUST start with data:image/png;base64,
            // This renders the QR code image for the user to scan
            document.getElementById("qrContainer").innerHTML =
              `<img src="${data.qrCode}" alt="Scan me" style="width: 200px; height: 200px;" />`;
          } else {
            alert(
              "Backend didn't send a QR code: " +
                (data.error || "Unknown error"),
            );
          }
        } catch (err) {
          console.error("Frontend Error:", err);
          alert("Failed to contact server.");
        }
      }

      // Verify the 6-digit code from the Authenticator app to finalize setup
      async function verifyTOTP() {
        const res = await fetch(`${API_URL}/totp/verify`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentUserId,
            token: document.getElementById("totpToken").value,
          }),
        });
        log(await res.json());
      }

      // --- User Authentication Functions ---
      async function register() {
        // Send registration details (username, email, password) to backend
        const res = await fetch(`${API_URL}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("regUser").value,
            email: document.getElementById("regEmail").value,
            password: document.getElementById("regPass").value,
          }),
        });
        const data = await res.json();
        log(data);
      }

      async function login() {
        // Send login credentials
        const res = await fetch(`${API_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("loginEmail").value,
            password: document.getElementById("loginPass").value,
          }),
        });
        const data = await res.json();

        // If login is successful, save the userId for later actions (like adding beneficiaries)
        if (data.userId) {
          currentUserId = data.userId;
          document.getElementById("displayUserId").innerText = currentUserId;
          alert("OTP sent! Check your terminal for the Ethereal link.");
        }
        log(data);
      }

      // --- Password Reset Functions ---
      async function forgotPassword() {
        const res = await fetch(`${API_URL}/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("forgotEmail").value,
          }),
        });
        log(await res.json());
      }

      async function resetPassword() {
        const res = await fetch(`${API_URL}/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token: document.getElementById("resetToken").value,
            newPassword: document.getElementById("newPass").value,
          }),
        });
        log(await res.json());
      }

      // Verify the Email OTP (sent after login)
      async function verifyOTP() {
        if (!currentUserId) return alert("Login first to get a User ID!");
        const res = await fetch(`${API_URL}/totp/verify-otp`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentUserId,
            otp: document.getElementById("otpCode").value,
          }),
        });
        const data = await res.json();
        log(data);
      }

      // --- Beneficiary Functions ---
      async function addBeneficiary() {
        if (!currentUserId) return alert("Login first!");
        const res = await fetch(`${API_URL}/beneficiaries`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentUserId,
            fullName: document.getElementById("benName").value,
            email: document.getElementById("benEmail").value,
            relationship: document.getElementById("benRel").value,
          }),
        });
        const data = await res.json();
        if (data.beneficiary) {
          lastBenId = data.beneficiary._id;
          document.getElementById("displayBenId").innerText = lastBenId;
        }
        log(data);
      }

      // --- Vault/Asset Functions ---
      async function uploadAsset() {
        if (!currentUserId) return alert("Login first!");
        const res = await fetch(`${API_URL}/vault/upload`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId: currentUserId,
            encryptedData: "SIMULATED_ENCRYPTED_BLOB_V2", // Mock data for now
            nonce: "mock_nonce_12345",
            fileName: document.getElementById("fileName").value,
            fileType: "application/pdf",
            fileSize: 1024,
          }),
        });
        const data = await res.json();
        log(data);
      }

      // Fetch list of assets for the current user
      async function listAssets() {
        if (!currentUserId) return alert("Login first!");
        const res = await fetch(`${API_URL}/vault/list/${currentUserId}`);
        const data = await res.json();
        const listDiv = document.getElementById("assetList");
        listDiv.innerHTML =
          "<ul>" +
          data.map((a) => `<li>${a.file_name} (ID: ${a._id})</li>`).join("") +
          "</ul>";
        log(data);
      }
    </script>
  </body>
</html>
