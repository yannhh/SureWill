<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Your Password</title>
  </head>
  <body>
    <h2>Create New Password</h2>
    <input type="password" id="newPass" placeholder="Enter new password" />
    <button onclick="submitNewPassword()">Update Password</button>
    <p id="status"></p>

    <script>
      // This function runs when the "Update Password" button is clicked
      async function submitNewPassword() {
        // 1. Get the token from the URL
        // Using URLSearchParams to easily parse query strings (like ?token=abc)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");

        // Get the new password typed by the user
        const newPassword = document.getElementById("newPass").value;

        // 2. Send the POST request to your backend
        // We use 'await' to wait for the server response before continuing
        const res = await fetch("https://localhost:5050/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, newPassword }), // Send data as a JSON string
        });

        // Parse the JSON response from the server
        const data = await res.json();
        document.getElementById("status").innerText =
          data.message || data.error;
        if (res.ok) alert("Password updated! You can now log in.");
      }
    </script>
  </body>
</html>
